name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sincronizar dependencias (Python 3.12)
        run: uv sync --frozen

      - name: Ruff (lint + formato)
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Mypy (tipos)
        run: uv run mypy
        continue-on-error: true   # informativo al inicio; endurecer luego

      - name: Tests unitarios (puros, sin DB ni LLM)
        run: uv run pytest

